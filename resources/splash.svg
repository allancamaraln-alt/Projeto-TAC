      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <rect width="2732" height="2732" fill="url(#bg)"/>

  <!-- Snowflake centered at (1366, 1150), scaled 2.4x from icon -->
