    <line x1="787"  y1="749"  x2="1945" y2="1551" stroke-width="125"/>

    <!-- Fork tips — top -->
    <line x1="1366" y1="469" x2="1179" y2="361" stroke-width="96"/>
    <line x1="1366" y1="469" x2="1553" y2="361" stroke-width="96"/>

    <!-- Fork tips — bottom -->
    <line x1="1366" y1="1831" x2="1179" y2="1939" stroke-width="96"/>
    <line x1="1366" y1="1831" x2="1553" y2="1939" stroke-width="96"/>

    <!-- Fork tips — upper-right -->
    <line x1="1945" y1="749" x2="2132" y2="857" stroke-width="96"/>
    <line x1="1945" y1="749" x2="1945" y2="533" stroke-width="96"/>

    <!-- Fork tips — lower-left -->
    <line x1="787"  y1="1551" x2="600"  y2="1443" stroke-width="96"/>
    <line x1="787"  y1="1551" x2="787"  y2="1767" stroke-width="96"/>

    <!-- Fork tips — upper-left -->
    <line x1="787"  y1="749" x2="787"  y2="533" stroke-width="96"/>
    <line x1="787"  y1="749" x2="600"  y2="857" stroke-width="96"/>

    <!-- Fork tips — lower-right -->
    <line x1="1945" y1="1551" x2="1945" y2="1767" stroke-width="96"/>
    <line x1="1945" y1="1551" x2="2132" y2="1443" stroke-width="96"/>

  </g>

  <circle cx="1366" cy="1150" r="82" fill="white"/>

  <text
